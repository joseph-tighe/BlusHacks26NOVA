<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA | Chat Rooms</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --c0: #0d0d0d;
  --c1: #141414;
  --c2: #1e1e1e;
  --c3: #2a2a2a;
  --c4: #3d3d3d;
  --c5: #5a5a5a;
  --c6: #8a8a8a;
  --c7: #b0b0b0;
  --c8: #d8d8d8;
  --white: #f0f0f0;
  --b: 2px solid var(--c3);
}

html, body {
  height: 100%;
  background: var(--c0);
  color: var(--c7);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 13px;
  line-height: 1.4;
  overflow: hidden;
 
}

input, textarea, button { cursor: crosshair; }

::-webkit-scrollbar { width: 3px; background: var(--c1); }
::-webkit-scrollbar-thumb { background: var(--c4); }

.container {
  display: grid;
  grid-template-columns: 260px 1fr;
  height: 100vh;
  border: 2px solid var(--c3);
}

/* ── SIDEBAR ── */
.sidebar {
  background: var(--c1);
  border-right: var(--b);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-head {
  padding: 18px 16px 14px;
  border-bottom: var(--b);
}

.sidebar-head .wordmark {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--white);
}

.sidebar-head .sub {
  font-size: 10px;
  letter-spacing: 0.06em;
  color: var(--c5);
  margin-top: 3px;
}

.user-section {
  padding: 14px 16px;
  border-bottom: var(--b);
}

.field-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--c5);
  margin-bottom: 6px;
}

#username {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--white);
  margin-bottom: 10px;
  border-left: 3px solid var(--c5);
  padding-left: 8px;
  min-height: 18px;
}

#languageLabel {
  font-size: 12px;
  color: var(--c6);
  margin-bottom: 10px;
  padding-left: 8px;
  border-left: 3px solid var(--c3);
  min-height: 16px;
}

.user-input {
  width: 100%;
  background: var(--c0);
  border: 2px solid var(--c3);
  border-left: 3px solid var(--c5);
  color: var(--c8);
  font-family: inherit;
  font-size: 12px;
  padding: 7px 8px;
  outline: none;
  display: block;
  margin-bottom: 6px;
  transition: border-color 0.08s, color 0.08s;
}
.user-input:focus { border-left-color: var(--white); color: var(--white); }
.user-input::placeholder { color: var(--c4); }

.btn-primary {
  width: 100%;
  background: var(--c2);
  border: 2px solid var(--c3);
  color: var(--c6);
  font-family: inherit;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 8px;
  cursor: auto;
  transition: background 0.08s, color 0.08s, border-color 0.08s;
  margin-bottom: 10px;
  display: block;
  text-align: center;
}
.btn-primary:hover { background: var(--c3); color: var(--white); border-color: var(--c5); }
.btn-primary:active { background: var(--c4); }

.rooms-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 14px 16px;
}

.rooms-head {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--c5);
  border-bottom: 1px solid var(--c3);
  padding-bottom: 8px;
  margin-bottom: 8px;
}

.room-list {
  flex: 1;
  overflow-y: auto;
  margin-bottom: 10px;
}

.room-item {
  padding: 7px 8px 7px 11px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--c5);
  cursor: auto;
  border-left: 3px solid transparent;
  transition: color 0.08s, border-color 0.08s, background 0.08s;
  user-select: none;
}
.room-item:hover { color: var(--c8); background: var(--c2); border-left-color: var(--c5); }
.room-item.active { color: var(--white); border-left-color: var(--white); background: var(--c2); }

.create-room input {
  width: 100%;
  background: var(--c0);
  border: 2px solid var(--c3);
  border-left: 3px solid var(--c5);
  color: var(--c8);
  font-family: inherit;
  font-size: 12px;
  padding: 7px 8px;
  outline: none;
  margin-bottom: 6px;
  transition: border-color 0.08s;
}
.create-room input:focus { border-left-color: var(--white); }
.create-room input::placeholder { color: var(--c4); }

.button-group {
  display: flex;
  gap: 8px;
}

.button-group button {
  flex: 1;
}

/* ── CHAT ── */
.chat-container {
  display: grid;
  grid-template-rows: auto 1fr auto;
  background: var(--c0);
  overflow: hidden;
}

.chat-header {
  background: var(--c1);
  border-bottom: var(--b);
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: stretch;
  min-height: 54px;
}

.room-info {
  padding: 12px 20px;
  border-right: var(--b);
  display: flex;
  flex-direction: column;
  justify-content: center;
}

#roomTitle {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--white);
}

#roomDescription {
  font-size: 10px;
  letter-spacing: 0.06em;
  color: var(--c5);
  margin-top: 3px;
}

.header-right {
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 14px;
}

.header-right .btn-primary {
  width: auto;
  margin: 0;
  padding: 6px 14px;
  font-size: 9px;
}

#roomUsers {
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--c5);
  text-transform: uppercase;
}

.messages-container {
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  height: 100%;
  min-height: 0;
  scroll-behavior: smooth;
}

.messages {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 0;
  min-height: 100%;
}

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: flex-end;
  height: 100%;
  padding: 24px 28px;
  gap: 5px;
}
.empty-state .e-head {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--c3);
}
.empty-state .e-sub {
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--c3);
}

.message {
  display: grid;
  grid-template-columns: 86px 1fr;
  border-top: 1px solid var(--c2);
  transition: background 0.06s;
}
.message:hover { background: var(--c1); }
.message.own { background: rgba(255,255,255,0.02); }
.message.own:hover { background: rgba(255,255,255,0.035); }

.msg-left {
  padding: 7px 10px 7px 20px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 2px;
  border-right: 1px solid var(--c2);
}

.msg-author {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--c6);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 64px;
}
.message.own .msg-author { color: var(--white); }

.msg-time {
  font-size: 9px;
  color: var(--c4);
  font-variant-numeric: tabular-nums;
}

.msg-body {
  padding: 7px 20px 7px 14px;
  color: var(--c7);
  font-size: 13px;
  line-height: 1.55;
  word-break: break-word;
}
.message.own .msg-body { color: var(--c8); }

.sys-msg {
  padding: 5px 20px;
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--c4);
  font-weight: 700;
  border-top: 1px solid var(--c2);
}

.chat-input-area {
  border-top: var(--b);
  display: grid;
  grid-template-columns: 1fr 72px;
  background: var(--c1);
}

.message-input {
  background: transparent;
  border: none;
  border-right: var(--b);
  color: var(--white);
  font-family: inherit;
  font-size: 13px;
  padding: 14px 20px;
  resize: none;
  outline: none;
  height: 60px;
  line-height: 1.5;
}
.message-input::placeholder { color: var(--c4); }
.message-input:focus { background: var(--c2); }

#sendBtn {
  background: var(--c2);
  border: none;
  color: var(--c6);
  font-family: inherit;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: grab;
  transition: background 0.08s, color 0.08s;
  padding: 0;
  margin: 0;
}
#sendBtn:hover { background: var(--c3); color: var(--white); }
#sendBtn:active { background: var(--c4); }

@keyframes rowIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
.message.new { animation: rowIn 0.12s ease-out; }

/* ── LOADING SCREEN ── */
#loadingScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: var(--c0);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: opacity 0.5s ease-out;
}

#loadingScreen.hidden {
  opacity: 0;
  pointer-events: none;
}

.loading-content {
  text-align: center;
}

.loading-text {
  font-size: 48px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--white);
  margin-bottom: 30px;
}

.loading-spinner {
  width: 50px;
  height: 50px;
  border: 3px solid var(--c3);
  border-top: 3px solid var(--white);
  border-radius: 50%;
  margin: 0 auto;
  animation: spin 1s linear infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Modal Styles */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.modal.hidden {
  display: none;
}

.modal-content {
  background-color: var(--bg);
  border: 1px solid var(--c3);
  border-radius: 8px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
  width: 90%;
  max-width: 400px;
  overflow: hidden;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
  border-bottom: 1px solid var(--c3);
}

.modal-header h2 {
  margin: 0;
  color: var(--white);
  font-size: 1.3rem;
}

.modal-close {
  background: none;
  border: none;
  color: var(--white);
  font-size: 1.5rem;
  cursor: pointer;
  padding: 0;
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-close:hover {
  color: var(--accent);
}

.modal-body {
  padding: 20px;
}

.modal-body p {
  color: var(--c2);
  margin: 0 0 15px 0;
  font-size: 0.9rem;
}

.modal-body input {
  width: 100%;
  margin-bottom: 0;
}

.modal-footer {
  display: flex;
  gap: 10px;
  padding: 15px 20px;
  border-top: 1px solid var(--c3);
}

.modal-footer button {
  flex: 1;
}

.btn-secondary {
  background-color: var(--c3);
  color: var(--white);
  border: none;
  padding: 10px 20px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 1rem;
  transition: background-color 0.2s;
}

.btn-secondary:hover {
  background-color: var(--c2);
}

/* Mobile sidebar toggle + layout */
.toggle-sidebar-btn,
  .open-sidebar-btn {
    display: none;
    margin-top: 8px;
    width: 34px;
    height: 34px;
    font-size: 18px;
    line-height: 1;
    border-radius: 4px;
  }

  .open-sidebar-btn {
    margin-right: 10px;
  }

@media (max-width: 854px) {
  .container {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr;
  }

  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1000;
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    border-right: none;
    background: var(--c1);
  }

  .sidebar.visible {
    transform: translateX(0);
  }

  .chat-container {
    grid-row: 2;
    width: 100%;
    height: calc(100vh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px));
    min-height: 100vh;
  }

  .messages-container {
    height: calc(100% - 115px);
  }

  .toggle-sidebar-btn,
  .open-sidebar-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .sidebar-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .chat-header {
    position: sticky;
    top: 0;
    z-index: 500;
  }

  .modal-content {
    width: 95%;
    max-width: 360px;
    margin: 10% auto;
  }

  .modal-body input {
    margin-top: 6px;
  }
}

@media (max-width: 640px) {
  .roomDescription,
  .roomUsers,
  .field-label {
    font-size: 9px;
  }

  .message-input {
    height: 80px;
  }
}
</style>
<body>
<div id="loadingScreen" class="loading-screen">
  <div class="loading-content">
    <div class="loading-text">NOVA<br><span style="font-weight: 250;">CHAT ROOMS</span></div>
    <div class="loading-spinner"></div>
  </div>
</div>

<!-- Password Modal -->
<div id="passwordModal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Room Password</h2>
      <button id="modalClose" class="modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <p id="modalRoomName"></p>
      <input type="password" id="modalPasswordInput" class="user-input" placeholder="Enter room password">
    </div>
    <div class="modal-footer">
      <button id="modalCancel" class="btn-secondary">Cancel</button>
      <button id="modalSubmit" class="btn-primary">Join</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="sidebar">
    <div class="sidebar-head">
      <div class="wordmark">NOVA</div>
      <div class="sub">Chat rooms · Tranlated</div>
      <button id="toggleSidebarBtn" class="btn-secondary toggle-sidebar-btn" title="Toggle sidebar">☰</button>
    </div>

    <div class="user-section">
      <div class="field-label">Identity</div>
      <div id="username">—</div>
      <input type="text" id="userInput" class="user-input" placeholder="username">
      <button id="setUserBtn" class="btn-primary">Set Username</button>

      <div class="field-label">Language</div>
      <div id="languageLabel">English</div>
      <input type="text" id="languageInput" class="user-input" placeholder="output language">
      <button id="setLanguageBtn" class="btn-primary">Set Language</button>
    </div>

    <div class="rooms-section">
      <div class="rooms-head">Rooms</div>
      <div class="room-list" id="roomList"></div>
      <div class="create-room">
        <input type="text" id="roomInput" placeholder="Room name">
        <input type="password" id="roomPasswordInput" class="user-input" placeholder="Optional password">
        <div class="button-group">
          <button id="createRoomBtn" class="btn-primary">Create</button>
          <button id="joinRoomBtn" class="btn-primary">Join</button>
        </div>
      </div>
    </div>
  </div>

  <div class="chat-container">
    <div class="chat-header">
      <div class="room-info">
        <div id="roomTitle">No room selected</div>
        <div id="roomDescription">Create or join a room to begin</div>
      </div>
      <div class="header-right">
        <button id="openSidebarBtn" class="btn-secondary open-sidebar-btn" title="Open sidebar">☰</button>
        <div id="roomUsers"></div>
      </div>
    </div>

    <div class="messages-container" id="messagesContainer">
      <div class="messages" id="messages">
        <div class="empty-state">
          <div class="e-head">No transmissions</div>
          <div class="e-sub">Select a room to begin</div>
        </div>
      </div>
    </div>

    <div class="chat-input-area">
      <textarea id="messageInput" class="message-input" placeholder="Type a message. Enter to send."></textarea>
      <button id="sendBtn">Send</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
