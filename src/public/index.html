<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRIVATE ROOM CHAT</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --c0: #0d0d0d;
  --c1: #141414;
  --c2: #1e1e1e;
  --c3: #2a2a2a;
  --c4: #3d3d3d;
  --c5: #5a5a5a;
  --c6: #8a8a8a;
  --c7: #b0b0b0;
  --c8: #d8d8d8;
  --white: #f0f0f0;
  --b: 2px solid var(--c3);
}

html, body {
  height: 100%;
  background: var(--c0);
  color: var(--c7);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 13px;
  line-height: 1.4;
  overflow: hidden;
 
}

input, textarea, button { cursor: crosshair; }

::-webkit-scrollbar { width: 3px; background: var(--c1); }
::-webkit-scrollbar-thumb { background: var(--c4); }

.container {
  display: grid;
  grid-template-columns: 260px 1fr;
  height: 100vh;
  border: 2px solid var(--c3);
}

/* ── SIDEBAR ── */
.sidebar {
  background: var(--c1);
  border-right: var(--b);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-head {
  padding: 18px 16px 14px;
  border-bottom: var(--b);
}

.sidebar-head .wordmark {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--white);
}

.sidebar-head .sub {
  font-size: 10px;
  letter-spacing: 0.06em;
  color: var(--c5);
  margin-top: 3px;
}

.user-section {
  padding: 14px 16px;
  border-bottom: var(--b);
}

.field-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--c5);
  margin-bottom: 6px;
}

#username {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--white);
  margin-bottom: 10px;
  border-left: 3px solid var(--c5);
  padding-left: 8px;
  min-height: 18px;
}

#languageLabel {
  font-size: 12px;
  color: var(--c6);
  margin-bottom: 10px;
  padding-left: 8px;
  border-left: 3px solid var(--c3);
  min-height: 16px;
}

.user-input {
  width: 100%;
  background: var(--c0);
  border: 2px solid var(--c3);
  border-left: 3px solid var(--c5);
  color: var(--c8);
  font-family: inherit;
  font-size: 12px;
  padding: 7px 8px;
  outline: none;
  display: block;
  margin-bottom: 6px;
  transition: border-color 0.08s, color 0.08s;
}
.user-input:focus { border-left-color: var(--white); color: var(--white); }
.user-input::placeholder { color: var(--c4); }

.btn-primary {
  width: 100%;
  background: var(--c2);
  border: 2px solid var(--c3);
  color: var(--c6);
  font-family: inherit;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 8px;
  cursor: auto;
  transition: background 0.08s, color 0.08s, border-color 0.08s;
  margin-bottom: 10px;
  display: block;
  text-align: center;
}
.btn-primary:hover { background: var(--c3); color: var(--white); border-color: var(--c5); }
.btn-primary:active { background: var(--c4); }

.rooms-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 14px 16px;
}

.rooms-head {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--c5);
  border-bottom: 1px solid var(--c3);
  padding-bottom: 8px;
  margin-bottom: 8px;
}

.room-list {
  flex: 1;
  overflow-y: auto;
  margin-bottom: 10px;
}

.room-item {
  padding: 7px 8px 7px 11px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--c5);
  cursor: auto;
  border-left: 3px solid transparent;
  transition: color 0.08s, border-color 0.08s, background 0.08s;
  user-select: none;
}
.room-item:hover { color: var(--c8); background: var(--c2); border-left-color: var(--c5); }
.room-item.active { color: var(--white); border-left-color: var(--white); background: var(--c2); }

.create-room input {
  width: 100%;
  background: var(--c0);
  border: 2px solid var(--c3);
  border-left: 3px solid var(--c5);
  color: var(--c8);
  font-family: inherit;
  font-size: 12px;
  padding: 7px 8px;
  outline: none;
  margin-bottom: 6px;
  transition: border-color 0.08s;
}
.create-room input:focus { border-left-color: var(--white); }
.create-room input::placeholder { color: var(--c4); }

/* ── CHAT ── */
.chat-container {
  display: grid;
  grid-template-rows: auto 1fr auto;
  background: var(--c0);
  overflow: hidden;
}

.chat-header {
  background: var(--c1);
  border-bottom: var(--b);
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: stretch;
  min-height: 54px;
}

.room-info {
  padding: 12px 20px;
  border-right: var(--b);
  display: flex;
  flex-direction: column;
  justify-content: center;
}

#roomTitle {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--white);
}

#roomDescription {
  font-size: 10px;
  letter-spacing: 0.06em;
  color: var(--c5);
  margin-top: 3px;
}

.header-right {
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 14px;
}

.header-right .btn-primary {
  width: auto;
  margin: 0;
  padding: 6px 14px;
  font-size: 9px;
}

#roomUsers {
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--c5);
  text-transform: uppercase;
}

.messages-container {
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.messages {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 0;
  min-height: 100%;
}

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: flex-end;
  height: 100%;
  padding: 24px 28px;
  gap: 5px;
}
.empty-state .e-head {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--c3);
}
.empty-state .e-sub {
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--c3);
}

.message {
  display: grid;
  grid-template-columns: 86px 1fr;
  border-top: 1px solid var(--c2);
  transition: background 0.06s;
}
.message:hover { background: var(--c1); }
.message.own { background: rgba(255,255,255,0.02); }
.message.own:hover { background: rgba(255,255,255,0.035); }

.msg-left {
  padding: 7px 10px 7px 20px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 2px;
  border-right: 1px solid var(--c2);
}

.msg-author {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--c6);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 64px;
}
.message.own .msg-author { color: var(--white); }

.msg-time {
  font-size: 9px;
  color: var(--c4);
  font-variant-numeric: tabular-nums;
}

.msg-body {
  padding: 7px 20px 7px 14px;
  color: var(--c7);
  font-size: 13px;
  line-height: 1.55;
  word-break: break-word;
}
.message.own .msg-body { color: var(--c8); }

.sys-msg {
  padding: 5px 20px;
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--c4);
  font-weight: 700;
  border-top: 1px solid var(--c2);
}

.chat-input-area {
  border-top: var(--b);
  display: grid;
  grid-template-columns: 1fr 72px;
  background: var(--c1);
}

.message-input {
  background: transparent;
  border: none;
  border-right: var(--b);
  color: var(--white);
  font-family: inherit;
  font-size: 13px;
  padding: 14px 20px;
  resize: none;
  outline: none;
  height: 60px;
  line-height: 1.5;
}
.message-input::placeholder { color: var(--c4); }
.message-input:focus { background: var(--c2); }

#sendBtn {
  background: var(--c2);
  border: none;
  color: var(--c6);
  font-family: inherit;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: grab;
  transition: background 0.08s, color 0.08s;
  padding: 0;
  margin: 0;
}
#sendBtn:hover { background: var(--c3); color: var(--white); }
#sendBtn:active { background: var(--c4); }

@keyframes rowIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
.message.new { animation: rowIn 0.12s ease-out; }
</style>
</head>
<body>
<div class="container">
  <div class="sidebar">
    <div class="sidebar-head">
      <div class="wordmark">Private Room</div>
      <div class="sub">Encrypted · Local · Direct</div>
    </div>

    <div class="user-section">
      <div class="field-label">Identity</div>
      <div id="username">—</div>
      <input type="text" id="userInput" class="user-input" placeholder="username">
      <button id="setUserBtn" class="btn-primary">Set Username</button>

      <div class="field-label">Language</div>
      <div id="languageLabel">English</div>
      <input type="text" id="language" class="user-input" placeholder="output language">
      <button id="setLanguageBtn" class="btn-primary">Set Language</button>
    </div>

    <div class="rooms-section">
      <div class="rooms-head">Rooms</div>
      <div class="room-list" id="roomList"></div>
      <div class="create-room">
        <input type="text" id="roomInput" placeholder="Room name or username">
        <button id="createRoomBtn" class="btn-primary">Create / Join</button>
      </div>
    </div>
  </div>

  <div class="chat-container">
    <div class="chat-header">
      <div class="room-info">
        <div id="roomTitle">No room selected</div>
        <div id="roomDescription">Create or join a room to begin</div>
      </div>
      <div class="header-right">
        <div id="roomUsers"></div>
      </div>
    </div>

    <div class="messages-container" id="messagesContainer">
      <div class="messages" id="messages">
        <div class="empty-state">
          <div class="e-head">No transmissions</div>
          <div class="e-sub">Select a room to begin</div>
        </div>
      </div>
    </div>

    <div class="chat-input-area">
      <textarea id="messageInput" class="message-input" placeholder="Type a message. Enter to send."></textarea>
      <button id="sendBtn">Send</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
